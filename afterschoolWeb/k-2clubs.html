<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grades K-2 Clubs </title>
  <link href="https://fonts.googleapis.com/css2?family=Castoro:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
      color: #9b438e;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(195, 105, 189, 0.4);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Castoro', serif;
    }

    h2 {
      font-family: 'Castoro', serif;
      font-size: 1.4em;
      color: rgb(230, 220, 225); 
      font-weight: bold; 
      text-align: center; 
      margin-top: 10px;
      margin-bottom: 10px; 
    }

    h3 {
      font-family: 'Castoro', serif;
      font-size: 2em;
      color: #9b438e;
      text-align: center;
      margin-top: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .header {
      position: relative;
      text-align: center;
      color: white;
    }

    .header img {
      width: 100%;
      height: 250px; 
      object-fit: cover; 
      opacity: 0.8; 
    }

    #tableContainer {
      display: flex;
      justify-content: center;
      overflow-x: auto;
      padding: 20px 0;
    }

    table {
      width: 80%;
      margin: 30px auto; 
      border-collapse: separate;
      border-spacing: 0;
      text-align: center;
      background: #fff;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
      border-radius: 20px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 8px;
      border: 1px solid #ddd;
      text-align: left;
      font-size: 0.9em;
    }

    th {
      background: #b460b2;
      color: white;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    .round-radio {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #9b438e;
      cursor: pointer;
      vertical-align: middle;
      position: relative;  
      margin-top: -2px;
      flex-shrink: 0;
    }

    .round-radio:checked {
      background-color: #da95d9;
      border-color: #9b438e;
    }

    .round-radio:disabled {
      background-color: #ccc;
      border-color: #999;
      cursor: not-allowed;
    }

    .day-column {
      background: #da95d9;
      color: white;
      font-weight: bold;
      font-size: 1.1em;
      text-align: center;
      vertical-align: middle;
      min-width: 100px;
    }

    td:first-child {
      font-size: 1.3em;
      font-family: 'Castoro', serif;
      text-align: center;
    }

    td:nth-child(2),
    td:nth-child(3) {
      font-size: 1.1em;
      margin-bottom: 10px;
      font-family: 'Castoro', serif;
    }

    .club-option {
      display: flex;
      align-items: flex-start;
      margin: 8px 0;
      padding: 5px;
      border-radius: 4px;
      gap: 8px;
    }

    .club-option.full {
      background-color: #ffebee;
      opacity: 0.7;
    }

    .club-option.near-full {
      background-color: #fff9e6;
    }

    .club-info {
      flex-grow: 1;
      min-width: 0;
    }

    .club-name {
      font-weight: 500;
      word-wrap: break-word;
    }

    .club-details {
      font-size: 0.9em;
      color: #666;
      word-wrap: break-word;
    }

    .club-cost {
      color: #9b438e;
      font-weight: bold;
    }

    .club-capacity {
      color: #e91e63;
      font-size: 0.85em;
    }

    .submit-btn {
      display: block;
      margin: 30px auto;
      padding: 12px 25px;
      background: #9b438e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .submit-btn:hover {
      background: #da95d9;
    }

    .form-container {
      text-align: center;
      margin: 60px auto 40px;
      max-width: 600px;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .form-container input[type="text"],
    .form-container input[type="email"] {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      font-family: 'Inter', sans-serif;
    }

    .form-container input:focus {
      border-color: #9b438e;
      outline: none;
    }

    .backup-selection {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .backup-selection.show {
      display: block;
    }

    .backup-selection h4 {
      color: #856404;
      margin-top: 0;
      font-family: 'Castoro', serif;
    }

    .backup-option {
      margin: 15px 0;
      padding: 15px;
      background: white;
      border-radius: 5px;
      border-left: 4px solid #ffc107;
    }

    .backup-option label {
      display: block;
      margin: 10px 0;
    }

    .backup-option select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
    }

    .back-link {
      display: inline-block;
      margin: 30px auto;
      padding: 12px 25px;
      background: #9b438e;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      border: none;
      cursor: pointer;
    }

    .back-link:hover {
      background: #da95d9;
    }

    .demo-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 15px;
      border-radius: 5px;
      font-size: 0.9em;
      z-index: 1000;
    }
  </style>
</head>
<body>

  <div class="header"> 
    <img src="https://thumb.photo-ac.com/92/925318b56176cb6b8118eba687f19121_t.jpeg">
    <h1>K-2 Club Registration</h1>
  </div>

  <div id="tableContainer">
    <table id="clubTable">
      <thead>
        <tr>
          <th><h2>Day</h2></th>
          <th><h2>First Period (2:30–3:30 PM)</h2></th>
          <th><h2>Second Period (3:30–4:30 PM)</h2></th>
        </tr>
      </thead>
      <tbody id="clubTableBody"></tbody>
    </table>
  </div>

  <div class="form-container">
    <h3>Confirm Your Selection</h3>
    <p id="selected-clubs"><strong>Selected Clubs:</strong> None</p>
    
    <div id="backupSelection" class="backup-selection">
      <h4>⚠️ Some clubs may be full - Please select backup choices</h4>
      <p style="font-size: 0.9em; color: #666;">Select your 2nd and 3rd choice for any day where your first choice might be full.</p>
      <div id="backupOptions"></div>
    </div>
    
    <form id="finalForm">
      <input type="text" id="parentName" placeholder="Parent's Name" required>
      <input type="text" id="childName" placeholder="Child's Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="phone" placeholder="Phone Number (optional)">
      <button type="submit" class="submit-btn">Submit Registration</button>
    </form>
  </div>

  <div style="text-align: center;">
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

<script>
const clubData = {
  monday: {
    first: [
      { name: "Homework Help", cost: 0, maxCapacity: 15, currentEnrolled: 5 },
      { name: "Origami Fun", cost: 0, maxCapacity: 12, currentEnrolled: 8 },
      { name: "Build Away", cost: 0, maxCapacity: 10, currentEnrolled: 10 },
      { name: "Center Stage", cost: 0, maxCapacity: 20, currentEnrolled: 3 },
      { name: "Mixed Martial Arts", cost: 25, maxCapacity: 15, currentEnrolled: 14 }
    ],
    second: [
      { name: "Amazing Athletes: Baseball", cost: 150, maxCapacity: 16, currentEnrolled: 15 },
      { name: "Looming Adventures", cost: 0, maxCapacity: 12, currentEnrolled: 2 },
      { name: "Design 101", cost: 0, maxCapacity: 15, currentEnrolled: 7 }
    ]
  },
  tuesday: {
    first: [
      { name: "Homework Help", cost: 0, maxCapacity: 15, currentEnrolled: 6 },
      { name: "Beginners Chess", cost: 150, maxCapacity: 12, currentEnrolled: 11 },
      { name: "Center Stage", cost: 0, maxCapacity: 20, currentEnrolled: 8 }
    ],
    second: [
      { name: "Basketball", cost: 150, maxCapacity: 16, currentEnrolled: 13 },
      { name: "Paper Pals", cost: 0, maxCapacity: 15, currentEnrolled: 5 }
    ]
  },
  wednesday: {
    first: [
      { name: "Homework Help", cost: 0, maxCapacity: 15, currentEnrolled: 7 },
      { name: "Creative Crafts", cost: 0, maxCapacity: 12, currentEnrolled: 9 },
      { name: "Center Stage", cost: 0, maxCapacity: 20, currentEnrolled: 10 }
    ],
    second: [
      { name: "Soccer", cost: 150, maxCapacity: 16, currentEnrolled: 16 },
      { name: "Looming Adventures", cost: 0, maxCapacity: 12, currentEnrolled: 4 }
      ]
  },
  thursday: {
    first: [
      { name: "Homework Help", cost: 0, maxCapacity: 15, currentEnrolled: 8 },
      { name: "Origami Fun", cost: 0, maxCapacity: 12, currentEnrolled: 10 },
      { name: "Center Stage", cost: 0, maxCapacity: 20, currentEnrolled: 12 }
    ],
    second: [
      { name: "Tennis", cost: 150, maxCapacity: 16, currentEnrolled: 14 },
      { name: "Design 101", cost: 0, maxCapacity: 15, currentEnrolled: 9 }
    ]
  },
  friday: {
    first: [
      { name: "Homework Help", cost: 0, maxCapacity: 15, currentEnrolled: 9 },
      { name: "Creative Crafts", cost: 0, maxCapacity: 12, currentEnrolled: 11 },
      { name: "Center Stage", cost: 0, maxCapacity: 20, currentEnrolled: 15 }
    ],
    second: [
      { name: "Amazing Athletes: Soccer", cost: 150, maxCapacity: 16, currentEnrolled: 12 },
      { name: "Paper Pals", cost: 0, maxCapacity: 15, currentEnrolled: 7 }
    ]
  }
};

function generateClubTable() {
  const tbody = document.getElementById('clubTableBody');
  tbody.innerHTML = '';

  Object.keys(clubData).forEach(day => {
    const row = document.createElement('tr');
    
    const dayCell = document.createElement('td');
    dayCell.className = 'day-column';
    dayCell.textContent = day.charAt(0).toUpperCase() + day.slice(1);
    row.appendChild(dayCell);
    
    const firstCell = document.createElement('td');
    clubData[day].first.forEach(club => {
      const clubDiv = createClubOption(club, `${day}-first`);
      firstCell.appendChild(clubDiv);
    });
    row.appendChild(firstCell);
    
    const secondCell = document.createElement('td');
    clubData[day].second.forEach(club => {
      const clubDiv = createClubOption(club, `${day}-second`);
      secondCell.appendChild(clubDiv);
    });
    row.appendChild(secondCell);
    
    tbody.appendChild(row);
  });
}

function createClubOption(club, radioName) {
  const isFull = club.currentEnrolled >= club.maxCapacity;
  const isNearFull = club.currentEnrolled >= club.maxCapacity * 0.9;
  const spotsLeft = club.maxCapacity - club.currentEnrolled;
  
  const clubDiv = document.createElement('div');
  clubDiv.className = `club-option ${isFull ? 'full' : ''} ${isNearFull && !isFull ? 'near-full' : ''}`;
  
  const input = document.createElement('input');
  input.type = 'radio';
  input.name = radioName;
  input.value = club.name;
  input.className = 'round-radio';
  input.disabled = isFull;
  
  const infoDiv = document.createElement('div');
  infoDiv.className = 'club-info';
  
  const nameSpan = document.createElement('span');
  nameSpan.className = 'club-name';
  nameSpan.textContent = club.name;
  
  const detailsDiv = document.createElement('div');
  detailsDiv.className = 'club-details';
  
  let detailsText = '';
  if (club.cost > 0) {
    detailsText += `Cost: $${club.cost} • `;
  }
  
  if (isFull) {
    detailsText += 'FULL ❌';
  } else if (isNearFull) {
    detailsText += `Only ${spotsLeft} spot${spotsLeft !== 1 ? 's' : ''} left! ⚠️`;
  } else {
    detailsText += `${spotsLeft} spots available`;
  }
  
  detailsDiv.innerHTML = detailsText;
  
  infoDiv.appendChild(nameSpan);
  infoDiv.appendChild(detailsDiv);
  
  clubDiv.appendChild(input);
  clubDiv.appendChild(infoDiv);
  
  return clubDiv;
}

function updateSelectedClubs() {
  const selected = [];
  const selectedByDay = {};
  
  document.querySelectorAll("input[type=radio]:checked").forEach(r => {
    selected.push(r.value);
    const radioName = r.name;
    selectedByDay[radioName] = r.value;
  });

  document.getElementById("selected-clubs").innerHTML = 
    "<strong>Selected Clubs:</strong> " + (selected.length ? selected.join(", ") : "None");
  
  checkForPotentialWaitlists(selectedByDay);
}

function checkForPotentialWaitlists(selectedByDay) {
  const backupSection = document.getElementById('backupSelection');
  const backupOptions = document.getElementById('backupOptions');
  let needsBackup = false;
  
  backupOptions.innerHTML = '';
  
  Object.keys(selectedByDay).forEach(dayPeriod => {
    const selectedClub = selectedByDay[dayPeriod];
    const [day, period] = dayPeriod.split('-');
    
    let clubInfo = null;
    if (clubData[day] && clubData[day][period]) {
      clubInfo = clubData[day][period].find(c => c.name === selectedClub);
    }
    
    if (clubInfo && clubInfo.currentEnrolled >= clubInfo.maxCapacity * 0.9) {
      needsBackup = true;
      
      const backupDiv = document.createElement('div');
      backupDiv.className = 'backup-option';
      backupDiv.innerHTML = `
        <strong>${day.charAt(0).toUpperCase() + day.slice(1)} - ${period === 'first' ? 'First' : 'Second'} Period</strong>
        <p style="font-size: 0.9em; margin: 5px 0; color: #666;">First choice: <strong>${selectedClub}</strong> (${clubInfo.maxCapacity - clubInfo.currentEnrolled} spots left)</p>
        <label>
          <strong>2nd Choice:</strong>
          <select name="backup-${dayPeriod}-second">
            <option value="">Select a backup...</option>
            ${getBackupOptions(day, period, selectedClub)}
          </select>
        </label>
        <label>
          <strong>3rd Choice:</strong>
          <select name="backup-${dayPeriod}-third">
            <option value="">Select a backup...</option>
            ${getBackupOptions(day, period, selectedClub)}
          </select>
        </label>
      `;
      backupOptions.appendChild(backupDiv);
    }
  });
  
  if (needsBackup) {
    backupSection.classList.add('show');
  } else {
    backupSection.classList.remove('show');
  }
}

function getBackupOptions(day, period, excludeClub) {
  if (!clubData[day] || !clubData[day][period]) return '';
  
  return clubData[day][period]
    .filter(club => club.name !== excludeClub && club.currentEnrolled < club.maxCapacity)
    .map(club => `<option value="${club.name}">${club.name} (${club.maxCapacity - club.currentEnrolled} spots)</option>`)
    .join('');
}

document.addEventListener('DOMContentLoaded', function() {
  generateClubTable();
  
  document.addEventListener('change', function(e) {
    if (e.target.type === 'radio') {
      updateSelectedClubs();
    }
  });
  
  document.getElementById('finalForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const parentName = document.getElementById('parentName').value;
    const childName = document.getElementById('childName').value;
    const email = document.getElementById('email').value;
    const selected = [];
    
    document.querySelectorAll("input[type=radio]:checked").forEach(r => {
      selected.push(r.value);
    });
    
    const queryParams = new URLSearchParams({
      parentName: parentName,
      childName: childName,
      email: email,
      clubs: selected.join(', ')
    });
    
    window.location.href = 'confirmationk-2.html?' + queryParams.toString();
  });
});
</script>

</body>
</html>
