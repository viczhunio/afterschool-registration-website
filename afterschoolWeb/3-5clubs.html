<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset = "UTF-8">
    <title>3-5 Clubs</title>
    <link href="https://fonts.googleapis.com/css2?family=Castoro:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: #f9f9f9;
        }
            
        h1 {
            margin: 0;
            font-size: 2.5em;
            color: #9b438e;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(195, 105, 189, 0.4);
            border-radius: 8px;
            padding: 10px 20px;
            font-family: 'Castoro', serif;
    }

        h2 {
            font-family: 'Castoro', serif;
            font-size: 1.4em;
            color: rgb(230, 220, 225); 
            font-weight: bold; 
            text-align: center; 
            margin-top: 10px;
            margin-bottom: 10px; 
    }

        h3 {
            font-family: 'Castoro', serif;
            font-size: 1.2em;
            color: #9b438e; 
            font-weight: bold; 
            text-align: center; 
            margin-top: 10px;
            margin-bottom: 10px; 
    }
        .header img {
            width: 100%;
            height: 250px;
            object-fit: cover;  
            opacity: 0.8;
        }

        .header {
            position: relative;
            text-align: center;
            color: white;
        }

        table {
            width: 70%;
            margin: 30px auto;
            border-collapse: collapse;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background: white;
            overflow: hidden; 
            text-align: center; 
        }

        th, td {
            padding: 15px auto;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background: #b460b2;
            color: white;
            text-align: center;
        }   
        tr:nth-child(even) {
             background: #f2f2f2;
        }
        .day-column {
            background: #da95d9;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
        }
        td:first-child {
            font-size: 1.3em;
            font-family: 'Castoro', serif;
            text-align: center;
        }
        td:nth-child(2),
        td:nth-child(3){
            font-size: 1.1em;
            margin-bottom: 10px;
            font-family: 'Castoro', serif;
        }

    </style>
    </head>
    <body>
        <!--Header Section-->
         <div class="header"> 
        <img src="https://thumb.photo-ac.com/92/925318b56176cb6b8118eba687f19121_t.jpeg">
            <h1> K-2 Club Registration</h1>
        </div>
        <table>
            <!--Table Section-->
            <tr>
                <th><h2>Day</h2></th>
                <th><h2>First Period (2:30 PM - 3:30 PM)</h2></th>
                <th><h2>Second Period (3:30 PM - 4:30 PM)</h2></th>
            </tr>
            <tr> 
                <td class="day-column">Monday </td>
            </tr>

        </table>
    </body>
